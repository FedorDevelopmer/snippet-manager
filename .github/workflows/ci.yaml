name: Snippet Manager Preparation
on:
  push:
    branches: [ "main" ]
  pull_request:
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run tests
        working-directory: snippet-manager-back
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Backend build
        working-directory: snippet-manager-back
        run: ./mvnw clean install

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Prepare deps
        working-directory: snippet-manager-front
        run: npm install

      - name: Frontend build
        working-directory: snippet-manager-front
        run: npm run build
