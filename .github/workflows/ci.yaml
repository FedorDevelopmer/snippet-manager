name: Snippet Manager Preparation
on:
  push:
    branches: [ "main" ]
  pull_request:
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"

      - name: Run tests
      - run: cd backend & ./mvnw test

      - name: Backend build
      - run: ./mvnw clean install

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Prepare deps
      - run: npm install

      - name: Frontend build
      - run: npm run build
